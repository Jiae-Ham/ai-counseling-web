<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담원 대시보드 — CareDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #fff;
            --card: #f9fafb;
            --hover: #f3f4f6;
            --sel: #eff6ff;
            --blue: #2563eb;
            --green: #16a34a;
            --purple: #7c3aed;
            --text: #111827;
            --muted: #6b7280;
            --dim: #9ca3af;
            --border: #e5e7eb;
            --border2: #d1d5db;
            --err: #dc2626;
            --warn: #d97706;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
        }

        .logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--green), #15803d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .hr {
            margin-left: auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ubadge {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
        }

        .btnlo {
            background: #fff;
            border: 1.5px solid var(--border2);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 500;
            transition: all .2s;
        }

        .btnlo:hover {
            border-color: var(--err);
            color: var(--err);
        }

        .stats {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 10px 24px;
            display: flex;
            gap: 28px;
            flex-shrink: 0;
        }

        .sn {
            font-size: 22px;
            font-weight: 800;
            color: var(--blue);
        }

        .sl {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        /* 3-panel layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pcol {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
            flex-shrink: 0;
            width: 240px;
        }

        .pcol:nth-child(3) {
            width: 260px;
        }

        .pcol:last-child {
            border-right: none;
            background: var(--bg);
            flex: 1;
            flex-shrink: 1;
            width: auto;
        }

        .resize-handle {
            width: 5px;
            cursor: col-resize;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.1s;
            position: relative;
            z-index: 10;
        }

        .resize-handle:hover, .resize-handle.dragging {
            background: var(--blue);
        }

        .filter-bar {
            display: flex;
            gap: 4px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
        }

        .fbtn {
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            border: 1.5px solid var(--border2);
            background: #fff;
            color: var(--dim);
            font-weight: 600;
            transition: all .15s;
        }

        .fbtn.active {
            border-color: var(--blue);
            color: var(--blue);
            background: #eff6ff;
        }

        .resize-handle-v {
            height: 5px;
            cursor: row-resize;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.1s;
            display: none;
        }

        .resize-handle-v:hover, .resize-handle-v.dragging {
            background: var(--blue);
        }

        .memo-wrap {
            padding: 8px 10px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            overflow: hidden;
            height: 140px;
        }

        .memo-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--dim);
        }

        .memo-area {
            width: 100%;
            flex: 1;
            min-height: 0;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            font-family: inherit;
            resize: none;
            outline: none;
            color: var(--text);
            background: #fafafa;
            box-sizing: border-box;
        }

        .memo-area:focus {
            border-color: var(--blue);
            background: #fff;
        }

        .memo-save {
            align-self: flex-end;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            border: 1.5px solid var(--blue);
            color: var(--blue);
            background: #eff6ff;
        }

        .memo-save:hover { background: #dbeafe; }

        .phdr {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .ptitle {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
        }

        .psub {
            font-size: 12px;
            color: var(--dim);
            margin-top: 2px;
        }

        .srchwrap {
            padding: 9px 13px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .srchinp {
            width: 100%;
            padding: 8px 12px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }

        .srchinp:focus {
            border-color: var(--blue);
            background: #fff;
        }

        .srchinp::placeholder {
            color: var(--dim);
        }

        .scrollable {
            overflow-y: auto;
            flex: 1;
        }

        .scrollable::-webkit-scrollbar {
            width: 4px;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .15s;
        }

        .row:hover {
            background: var(--hover);
        }

        .row.active {
            background: var(--sel);
            border-left: 3px solid var(--blue);
        }

        .rname {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .rsub {
            font-size: 11px;
            color: var(--dim);
            margin-top: 3px;
        }

        .mb {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            background: #eff6ff;
            color: var(--blue);
            border: 1px solid rgba(37, 99, 235, .25);
            font-weight: 600;
            margin-left: 4px;
        }

        .smeta {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .rstatus {
            font-size: 11px;
            font-family: inherit;
            font-weight: 600;
            border-radius: 5px;
            border: 1.5px solid var(--border2);
            background: #fff;
            color: var(--text);
            padding: 1px 4px;
            cursor: pointer;
            outline: none;
        }

        .rstatus.rs-가망 { border-color: #6ee7b7; color: #065f46; background: #ecfdf5; }
        .rstatus.rs-비가망 { border-color: #fca5a5; color: #b91c1c; background: #fef2f2; }
        .rstatus.rs-미확인 { border-color: var(--border2); color: var(--muted); background: #f9fafb; }

        .badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .b-c {
            background: #dcfce7;
            color: #15803d;
        }

        .b-e {
            background: #f3f4f6;
            color: var(--muted);
        }

        .b-r {
            background: #fef3c7;
            color: #b45309;
        }

        .b-d {
            background: #f9fafb;
            color: var(--dim);
        }

        /* Chat — USER LEFT, AI RIGHT */
        .chdr {
            padding: 13px 22px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cphone {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cphone::before {
            content: '📱';
        }

        .csid {
            font-size: 10px;
            color: var(--dim);
            margin-top: 2px;
            font-family: monospace;
        }

        .cmb {
            background: #eff6ff;
            border: 1.5px solid rgba(37, 99, 235, .3);
            color: var(--blue);
            font-size: 11px;
            border-radius: 12px;
            padding: 3px 10px;
            font-weight: 700;
        }

        .chatarea {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chatarea::-webkit-scrollbar {
            width: 4px;
        }

        .chatarea::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .mrow {
            display: flex;
            gap: 6px;
            max-width: 78%;
        }

        .mrow.user {
            align-self: flex-start;
            flex-direction: row;
        }

        .mrow.assistant {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .mavt {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .mavt.user {
            background: linear-gradient(135deg, var(--green), #15803d);
        }

        .mavt.assistant {
            background: linear-gradient(135deg, var(--blue), var(--purple));
        }

        .mbody {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .mrow.assistant .mbody {
            align-items: flex-end;
        }

        .mrole {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            text-transform: uppercase;
        }

        .mbubl {
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.55;
            word-break: break-word;
        }

        .mrow.user .mbubl {
            background: #fff;
            border: 1.5px solid var(--border);
            border-top-left-radius: 3px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .05);
        }

        .mrow.assistant .mbubl {
            background: var(--blue);
            color: #fff;
            border-top-right-radius: 3px;
        }

        .mtime {
            font-size: 10px;
            color: var(--dim);
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 10px;
            padding: 24px;
        }

        .ei {
            font-size: 36px;
            opacity: .45;
        }

        .et {
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
            color: var(--muted);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .spin {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border2);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .fi {
            animation: fi .18s ease;
        }

        /* 입시웄근 버튼 */
        .btn-checkin {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 700;
            border: 2px solid;
            transition: all .2s;
        }

        .btn-checkin.offline {
            border-color: var(--green);
            color: var(--green);
            background: #f0fdf4;
        }

        .btn-checkin.offline:hover {
            background: #dcfce7;
        }

        .btn-checkin.online {
            border-color: var(--err);
            color: var(--err);
            background: #fef2f2;
        }

        .btn-checkin.online:hover {
            background: #fee2e2;
        }

        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--card);
            border: 1.5px solid var(--border);
        }

        .status-dot .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.online .dot {
            background: var(--green);
            box-shadow: 0 0 0 2px rgba(22, 163, 74, .2);
        }

        .status-dot.offline .dot {
            background: #9ca3af;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">💬</div>
        <div>
            <div style="font-size:16px;font-weight:700">CareDesk</div>
            <div style="font-size:12px;color:var(--muted)">상담원 대시보드</div>
        </div>
        <div class="hr">
            <div class="status-dot offline" id="statusDot">
                <span class="dot"></span><span id="statusTxt">미출근</span>
            </div>
            <button class="btn-checkin offline" id="checkinBtn" onclick="toggleCheckin()">출근하기</button>
            <div class="ubadge">👤 <span id="cname">상담원</span></div>
            <button class="btnlo" onclick="logout()">로그아웃</button>
        </div>
    </header>
    <div class="stats">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="sn" id="stPhone">-</div>
            <div class="sl">담당 전화번호</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="sn" id="stSess">-</div>
            <div class="sl">총 세션 수</div>
        </div>
    </div>
    <div class="main">
        <!-- 1: 전화번호 목록 -->
        <div class="pcol">
            <div class="phdr">
                <div class="ptitle">전화번호 목록</div>
                <div class="psub" id="phoneSub">불러오는 중...</div>
            </div>
            <div class="srchwrap"><input class="srchinp" id="srchinp" type="text" placeholder="전화번호 검색..."
                    oninput="filterP()" /></div>
            <div class="scrollable" id="phoneList">
                <div class="loading">
                    <div class="spin"></div>불러오는 중
                </div>
            </div>
        </div>
        <div class="resize-handle" id="rh1"></div>
        <!-- 2: 세션 목록 -->
        <div class="pcol">
            <div class="phdr">
                <div class="ptitle">통화 세션</div>
                <div class="psub" id="sessSub">전화번호를 선택하세요</div>
            </div>
            <div class="filter-bar">
                <button class="fbtn active" id="rf-all" onclick="setReviewFilter('all')">전체</button>
                <button class="fbtn" id="rf-가망" onclick="setReviewFilter('가망')">가망</button>
                <button class="fbtn" id="rf-비가망" onclick="setReviewFilter('비가망')">비가망</button>
                <button class="fbtn" id="rf-미확인" onclick="setReviewFilter('미확인')">미확인</button>
            </div>
            <div class="scrollable" id="sessList">
                <div class="empty">
                    <div class="ei">📋</div>
                    <div class="et">전화번호를 선택하세요</div>
                </div>
            </div>
        </div>
        <div class="resize-handle" id="rh2"></div>
        <!-- 3: 대화 내역 -->
        <div class="pcol">
            <div class="chdr">
                <div>
                    <div class="cphone" id="chatPhone"
                        style="font-size:13px;font-weight:600;color:var(--muted);display:block">세션을 선택하세요</div>
                    <div class="csid" id="chatSid"></div>
                </div>
                <span id="chatBadge" class="cmb" style="display:none"></span>
            </div>
            <div class="chatarea" id="chatArea">
                <div class="empty">
                    <div class="ei">💬</div>
                    <div class="et">세션을 선택하면<br />AI 상담 대화 내역이 표시됩니다</div>
                </div>
            </div>
            <div class="resize-handle-v" id="vRh"></div>
            <div class="memo-wrap" id="memoWrap" style="display:none">
                <div class="memo-label">📝 메모</div>
                <textarea class="memo-area" id="memoText" placeholder="이 세션에 대한 메모를 입력하세요..."></textarea>
                <button class="memo-save" onclick="saveMemo()">저장</button>
            </div>
        </div>
    </div>
    <script>
        let allPhones = [], selPhKey = null, curSessId = null, allSessions = [], sessFilter = 'all', reviewFilter = 'all';

        (async () => {
            const me = await fetch('/api/auth/me').then(r => r.json());
            if (!me.success || me.data.role !== 'counselor') { location.href = '/'; return; }
            document.getElementById('cname').textContent = me.data.name;
            await loadAttendance();
            loadPhones();
        })();

        // 입퇴근 상태 로드
        async function loadAttendance() {
            try {
                const r = await fetch('/api/counselor/attendance-status').then(x => x.json());
                if (r.success) setAttendanceUI(r.data.attendance_status, r.data.checkin_at);
            } catch { }
        }

        function setAttendanceUI(status, checkinAt) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusTxt');
            const btn = document.getElementById('checkinBtn');
            const isOnline = status === 'online';
            dot.className = `status-dot ${isOnline ? 'online' : 'offline'}`;
            txt.textContent = isOnline
                ? ('출근 중' + (checkinAt ? ' · ' + fmtTime(checkinAt) + '부터' : ''))
                : '미출근';
            btn.className = `btn-checkin ${isOnline ? 'online' : 'offline'}`;
            btn.textContent = isOnline ? '퇴근하기' : '출근하기';
        }

        async function toggleCheckin() {
            const btn = document.getElementById('checkinBtn');
            const isOnline = btn.classList.contains('online');
            btn.disabled = true;
            try {
                const r = await fetch(isOnline ? '/api/counselor/checkout' : '/api/counselor/checkin',
                    { method: 'POST' }).then(x => x.json());
                if (r.success) {
                    const checkinAt = r.status === 'online' ? r.checkin_at : null;
                    setAttendanceUI(r.status, checkinAt);
                }
            } catch { }
            btn.disabled = false;
        }

        function fmtTime(dt) {
            if (!dt) return '';
            return new Date(dt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        async function loadPhones() {
            const data = await api('/api/counselor/phones');
            allPhones = data || [];
            const total = allPhones.reduce((a, p) => a + (p.session_count || 0), 0);
            document.getElementById('stPhone').textContent = allPhones.length;
            document.getElementById('stSess').textContent = total;
            document.getElementById('phoneSub').textContent = `총 ${allPhones.length}개 전화번호`;
            renderPhones(allPhones);
        }
        function filterP() {
            const q = document.getElementById('srchinp').value;
            renderPhones(allPhones.filter(p => (p.phone || '').includes(q)));
        }
        function renderPhones(list) {
            const el = document.getElementById('phoneList');
            if (!list.length) { el.innerHTML = mkEmpty('📋', '담당 상담이 없습니다'); return; }
            el.innerHTML = list.map(p => `
    <div class="row fi ${p.phone_key === selPhKey ? 'active' : ''}" onclick="pickPhone('${esc(p.phone_key)}','${esc(p.phone || '')}')">
      <div class="rname">${p.phone || '<span style="color:var(--dim);font-weight:400;font-size:12px">전화번호 미등록</span>'}</div>
      <div class="rsub">통화 세션 ${p.session_count}건</div>
    </div>
  `).join('');
        }
        function setSessFilter(f) {
            sessFilter = f;
            ['all', 'END', 'CONNECT'].forEach(k => { const el = document.getElementById('sf-' + (k === 'END' ? 'end' : k === 'CONNECT' ? 'conn' : 'all')); if (el) el.classList.toggle('active', k === f); });
            renderSessions();
        }
        function setReviewFilter(f) {
            reviewFilter = f;
            ['all', '가망', '비가망', '미확인'].forEach(k => {
                const el = document.getElementById('rf-' + k);
                if (el) el.classList.toggle('active', k === f);
            });
            renderSessions();
        }
        function renderSessions() {
            const sEl = document.getElementById('sessList');
            let list = allSessions;
            if (sessFilter !== 'all') list = list.filter(s => (s.status || '').toUpperCase().includes(sessFilter));
            if (reviewFilter !== 'all') list = list.filter(s => (s.review_status || '미확인') === reviewFilter);
            if (!list.length) { sEl.innerHTML = mkEmpty('📋', '해당 세션 없음'); return; }
            sEl.innerHTML = list.map(s => `
    <div class="row fi" onclick="pickSess(${s.id},'${esc(s.session_id || '')}','${esc(s.phone || '')}',this)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <div class="rname" style="font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fmtId(s.start_at, s.phone)}</div>
        <select class="rstatus rs-${esc(s.review_status||'미확인')}" onclick="event.stopPropagation()" onchange="updateReviewStatus(${s.id},this.value,this)">
          <option value="미확인" ${(s.review_status||'미확인')==='미확인'?'selected':''}>미확인</option>
          <option value="가망" ${(s.review_status||'')==='가망'?'selected':''}>가망</option>
          <option value="비가망" ${(s.review_status||'')==='비가망'?'selected':''}>비가망</option>
        </select>
      </div>
      <div class="smeta">
        <span class="badge ${bg(s.status)}">${s.status || '?'}</span>
        <span style="font-size:11px;color:var(--dim)">${fmt(s.start_at)}</span>
      </div>
    </div>
  `).join('');
        }
        async function pickPhone(key, phone) {
            selPhKey = key;
            renderPhones(allPhones.filter(p => (p.phone || '').includes(document.getElementById('srchinp').value)));
            document.getElementById('sessSub').textContent = phone || key;
            const sEl = document.getElementById('sessList');
            sEl.innerHTML = `<div class="loading"><div class="spin"></div>불러오는 중</div>`;
            resetChat();
            const data = await api(`/api/counselor/phones/${encodeURIComponent(key)}/sessions`);
            allSessions = data || [];
            if (!allSessions.length) { sEl.innerHTML = mkEmpty('📋', '세션 없음'); return; }
            renderSessions();
        }
        async function pickSess(id, sid, phone, el) {
            curSessId = id;
            document.querySelectorAll('#sessList .row').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            const phpEl = document.getElementById('chatPhone');
            phpEl.textContent = phone || `세션 #${id}`;
            phpEl.style.cssText = phone ? 'font-size:15px;font-weight:700;' : 'font-size:13px;font-weight:600;color:var(--muted)';
            document.getElementById('chatSid').textContent = sid ? `Session: ${sid}` : `#${id}`;
            document.getElementById('chatBadge').style.display = 'none';
            const chat = document.getElementById('chatArea');
            chat.innerHTML = `<div class="loading"><div class="spin"></div>대화 내역 불러오는 중</div>`;
            const data = await api(`/api/sessions/${id}/messages`);
            if (!data || !data.length) { chat.innerHTML = mkEmpty('💬', '대화 내역이 없습니다'); }
            else {
                const badge = document.getElementById('chatBadge');
                badge.textContent = `${data.length}개 메시지`; badge.style.display = 'inline-block';
                chat.innerHTML = data.map(m => `
    <div class="mrow ${m.role} fi">
      <div class="mavt ${m.role}">${m.role === 'user' ? '👤' : '🤖'}</div>
      <div class="mbody">
        <div class="mrole">${m.role === 'user' ? '사용자' : 'AI 상담사'}</div>
        <div class="mbubl">${esc(m.content)}</div>
        <div class="mtime">${fmt(m.created_at)}</div>
      </div>
    </div>
  `).join('');
                chat.scrollTop = chat.scrollHeight;
            }
            loadMemo(id);
        }
        async function loadMemo(id) {
            document.getElementById('memoWrap').style.display = 'flex';
            document.getElementById('vRh').style.display = 'block';
            const r = await fetch(`/api/sessions/${id}/memo`).then(x => x.json()).catch(() => null);
            document.getElementById('memoText').value = r && r.success ? (r.memo || '') : '';
        }
        async function updateReviewStatus(sessionId, val, sel) {
            sel.className = `rstatus rs-${val}`;
            const s = allSessions.find(x => x.id === sessionId);
            if (s) s.review_status = val;
            await fetch(`/api/sessions/${sessionId}/review-status`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: val })
            });
        }
        async function saveMemo() {
            if (!curSessId) return;
            const memo = document.getElementById('memoText').value;
            await fetch(`/api/sessions/${curSessId}/memo`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ memo }) });
        }
        function resetChat() {
            curSessId = null;
            const p = document.getElementById('chatPhone');
            p.textContent = '세션을 선택하세요'; p.style.cssText = 'font-size:13px;font-weight:600;color:var(--muted)';
            document.getElementById('chatSid').textContent = '';
            document.getElementById('chatBadge').style.display = 'none';
            document.getElementById('chatArea').innerHTML = mkEmpty('💬', '세션을 선택하세요');
            document.getElementById('memoWrap').style.display = 'none';
            document.getElementById('vRh').style.display = 'none';
        }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); location.href = '/'; }
        async function api(u) { try { const r = await fetch(u); const d = await r.json(); return d.success ? d.data : null; } catch { return null; } }
        function esc(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function parseUtc(dt) { if (!dt) return null; if (dt instanceof Date) return dt; const s = String(dt).replace(' ', 'T'); return new Date(/Z$|[+-]\d{2}:\d{2}$/.test(s) ? s : s + 'Z'); }
        function fmt(dt) { if (!dt) return '-'; return parseUtc(dt).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
        function fmtId(dt, phone) { if (!dt) return phone || '번호없음'; const d = parseUtc(dt); const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); return `${y}${m}${day}_${phone || '번호없음'}`; }
        function bg(s) { if (!s) return 'b-d'; const u = s.toUpperCase(); if (u.includes('CONNECT')) return 'b-c'; if (u.includes('END')) return 'b-e'; if (u.includes('RING')) return 'b-r'; return 'b-d'; }
        function mkEmpty(ico, txt) { return `<div class="empty"><div class="ei">${ico}</div><div class="et">${txt}</div></div>`; }
    </script>
    <script>
        // Resizable panels
        (function () {
            document.querySelectorAll('.resize-handle').forEach(function (handle) {
                handle.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    var leftCol = handle.previousElementSibling;
                    var startX = e.clientX;
                    var startW = leftCol.getBoundingClientRect().width;
                    handle.classList.add('dragging');
                    document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'col-resize';
                    function onMove(e) {
                        var dx = e.clientX - startX;
                        var newW = Math.max(0, startW + dx);
                        leftCol.style.width = newW + 'px';
                        leftCol.style.flex = 'none';
                    }
                    function onUp() {
                        handle.classList.remove('dragging');
                        document.body.style.userSelect = '';
                        document.body.style.cursor = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        })();

        // Vertical resize (chat ↔ memo)
        (function () {
            var vRh = document.getElementById('vRh');
            vRh.addEventListener('mousedown', function (e) {
                e.preventDefault();
                var memoWrap = document.getElementById('memoWrap');
                var startY = e.clientY;
                var startH = memoWrap.getBoundingClientRect().height;
                vRh.classList.add('dragging');
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'row-resize';
                function onMove(e) {
                    var dy = e.clientY - startY;
                    var newH = Math.max(40, startH - dy);
                    memoWrap.style.height = newH + 'px';
                }
                function onUp() {
                    vRh.classList.remove('dragging');
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        })();
    </script>
</body>

</html>
